<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 搜索引擎验证标签 - 待替换为实际验证码 -->
  <!-- Bing: <meta name="msvalidate.01" content="XXXXX" /> -->
  <!-- Google: <meta name="google-site-verification" content="XXXXX" /> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PawLang">
  <meta name="theme-color" content="#f59e0b">
  <meta name="description" content="PawLang，基于 AI 的宠物行为解读工具，帮你读懂毛孩子的每个动作">
  <meta property="og:title" content="PawLang - AI 宠物行为解读">
  <meta property="og:description" content="基于 500 万+宠物行为数据训练的 AI，帮你读懂它。提供行为解读、训练建议与宠物数字分身。">
  <meta property="og:image" content="/assets/icon-512.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pawlang.com">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">
  <link rel="stylesheet" href="/style.css">
  <title>PawLang - AI 宠物行为解读</title>
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <div class="header-content">
        <div class="logo-area">
          <div class="logo-text">
            <h1>PawLang <span class="beta-badge">体验版</span></h1>
            <p class="subtitle">AI 宠物行为解读</p>
          </div>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-area" id="chat-area">
      <div class="chat-welcome">
        <p class="welcome-title">你的宠物在想什么？</p>
        <p class="welcome-desc">基于 500 万+宠物行为数据训练的 AI，帮你读懂它</p>
        <div class="quick-prompts">
          <button class="quick-prompt" data-prompt="猫咪为什么总盯着我上厕所？">猫咪为什么总盯着我上厕所？</button>
          <button class="quick-prompt" data-prompt="狗狗追尾巴是焦虑吗？">狗狗追尾巴是焦虑吗？</button>
          <button class="quick-prompt" data-prompt="为什么狗狗总爱舔人？">为什么狗狗总爱舔人？</button>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="input-area">
      <div class="input-container">
        <input
          type="text"
          id="message-input"
          class="message-input"
          placeholder="描述宠物的行为，比如：猫半夜跑酷..."
          autocomplete="off"
          enterkeyhint="send"
        >
        <button id="send-btn" class="send-btn" aria-label="发送">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="pricing-bar">
        <span class="pricing-trial">体验版 · 免费试用</span>
        <span class="pricing-divider">|</span>
        <span>基础版 $2.99/月</span>
        <span class="pricing-divider">|</span>
        <span class="pricing-clone">克隆版 $4.99/月</span>
      </div>
      <div class="footer-links">
        <a href="/privacy">隐私政策</a>
      </div>
    </footer>

  </div>

  <script src="/app.js"></script>
</body>
</html>
